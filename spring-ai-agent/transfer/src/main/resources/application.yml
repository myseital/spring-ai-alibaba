server:
  port: 19000

spring:
  application:
    name: spring-ai-alibaba-agent-transfer
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
      config:
        namespace: b089daba-3c57-4ae8-8294-d08feac51795
        group: DEFAULT_GROUP
        file-extension: yaml
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
      max-poll-records: 5
      auto-offset-reset: earliest
    listener:
      ack-mode: manual_immediate
      type: batch
    admin:
      auto-create: true

  config:
    import:
      - nacos:transfer.yml?refreshEnabled=true
      - optional:classpath:.env[.properties]
  mail:
    host: smtp.qq.com
    port: 587
    username: ${QQ_MAIL}
    password: ${QQ_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  thymeleaf:
    cache: true
    check-template: true
    servlet:
      content-type: text/html
    enabled: true
    encoding: UTF-8
    excluded-view-names: ''
    mode: HTML
    prefix: classpath:/templates/
    suffix: .html
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen3-max
    ollama:
      base-url: http://localhost:11434
      chat:
        model: qwen3:latest
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_transfer?useUnicode=true&characterEncoding=utf-8&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: admin
  data:
    redis:
      host: localhost
      port: 6379
      database: 2
      timeout: 5s
      connect-timeout: 5s

mybatis-plus:
  configuration:
    # 日志输出到控制台中
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl